services:
  # 1. Node.js Express Backend API (REST + GraphQL)
  - type: web
    name: venue-vendors-backend-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        value: localhost
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: Password1!
      - key: DB_NAME
        value: venue_vendors

  # 2. React TS Frontend (Static Site Hosting)
  - type: web
    name: venue-vendors-frontend-app
    env: static
    plan: free
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      # Redirect all frontend routing requests back to index.html for React Router
      - type: rewrite
        source: /*
        destination: /index.html
