services:
  # 1. Node.js Express Backend API (REST API)
  - type: web
    name: venue-vendors-backend-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        value: localhost # Needs to be updated to cloud database host in Render dashboard
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: Password1!
      - key: DB_NAME
        value: venue_vendors

  # 2. React TS Frontend Client (Static Site Hosting)
  - type: web
    name: venue-vendors-frontend-app
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      # Redirect all frontend routing requests back to index.html for React Router
      - type: rewrite
        source: /*
        destination: /index.html

  # 3. Node.js GraphQL Admin Backend API
  - type: web
    name: venue-vendors-admin-backend-api
    env: node
    plan: free
    rootDir: admin-backend
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        value: localhost # Needs to be updated to cloud database host in Render dashboard
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: Password1!
      - key: DB_NAME
        value: venue_vendors

  # 4. React TS Admin Frontend Client (Static Site Hosting)
  - type: web
    name: venue-vendors-admin-frontend-app
    env: static
    plan: free
    rootDir: admin-frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      # Redirect all admin routing requests back to index.html for React Router
      - type: rewrite
        source: /*
        destination: /index.html

